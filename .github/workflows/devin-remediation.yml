name: Devin Auto-Remediation

on:
  issues:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: devin-remediation
  cancel-in-progress: false

jobs:
  remediate:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'devin-task'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r devin-requirements.txt

      - name: Run Devin remediation
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
        run: python orchestrator.py